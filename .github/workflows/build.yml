name: Build Sync XxX APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      app_name:
        description: 'Nama Aplikasi'
        required: true
        default: 'SyncXxX'
      package_name:
        description: 'Package Name (com.xxx.xxx)'
        required: true
        default: 'com.sync.xxx'
      version_name:
        description: 'Version Name'
        required: true
        default: '1.0.0'
      version_code:
        description: 'Version Code (angka)'
        required: true
        default: '1'
      build_type:
        description: 'Build Type'
        required: true
        default: 'release'
        type: choice
        options:
          - release
          - debug
      chat_id:
        description: 'Telegram Chat ID'
        required: false
        default: ''
      bot_token:
        description: 'Telegram Bot Token'
        required: false
        default: ''
      build_id:
        description: 'Build ID'
        required: false
        default: ''
      zip_path:
        description: 'ZIP Path in Repository'
        required: false
        default: ''
      is_zip:
        description: 'Is ZIP Build'
        required: false
        default: 'false'
      project_type:
        description: 'Project Type'
        required: false
        default: 'android'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write

    steps:
      - name: Notify Start (if triggered from bot)
        if: github.event.inputs.chat_id != '' && github.event.inputs.bot_token != ''
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ inputs.bot_token }}/sendMessage" \
            -d chat_id="${{ inputs.chat_id }}" \
            -d parse_mode="HTML" \
            -d text="⏳ <b>Build dimulai!</b>%0A%0A🏷️ App: <code>${{ inputs.app_name }}</code>%0A📦 Package: <code>${{ inputs.package_name }}</code>%0A🔢 Versi: <code>${{ inputs.version_name }}</code>+<code>${{ inputs.version_code }}</code>%0A🔨 Tipe: <code>${{ inputs.build_type }}</code>%0A🆔 Build ID: <code>${{ inputs.build_id }}</code>"

      - name: Checkout
        uses: actions/checkout@v4

      # Download ZIP if ZIP build
      - name: Download ZIP Project
        if: github.event.inputs.is_zip == 'true' && github.event.inputs.zip_path != ''
        run: |
          echo "📥 Downloading ZIP from repository..."
          mkdir -p temp_zip
          cd temp_zip
          curl -L -o project.zip "https://raw.githubusercontent.com/${{ github.repository }}/main/${{ github.event.inputs.zip_path }}"
          unzip -q project.zip -d project
          echo "📂 ZIP extracted successfully"
          ls -la project/

      # Setup project from ZIP - khusus struktur android/
      - name: Setup Project from ZIP
        if: github.event.inputs.is_zip == 'true'
        run: |
          if [ -d "temp_zip/project" ]; then
            # Check if there's a single root folder
            CONTENTS=($(ls -A temp_zip/project))
            if [ ${#CONTENTS[@]} -eq 1 ] && [ -d "temp_zip/project/${CONTENTS[0]}" ]; then
              # If single folder, move contents up
              mv temp_zip/project/${CONTENTS[0]}/* temp_zip/project/
              rmdir temp_zip/project/${CONTENTS[0]}
            fi
            
            # Copy project files to workspace
            cp -r temp_zip/project/* .
            
            # Pastikan struktur android/ ada
            if [ -d "android" ]; then
              echo "✅ Android project detected"
            elif [ -d "app" ]; then
              # Jika project langsung di root, pindahkan ke android/
              mkdir -p android
              mv app gradle gradlew gradle.properties gradlew.bat android/ 2>/dev/null || true
              echo "✅ Moved project to android/ structure"
            fi
            
            echo "✅ Project files copied to workspace"
            ls -la
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Pillow
        run: pip install Pillow

      - name: Generate App Icons
        run: |
          if [ -f "generate_icons.py" ]; then
            python3 generate_icons.py
          else
            echo "generate_icons.py not found, skipping..."
          fi

      # Patch AndroidManifest.xml
      - name: Patch AndroidManifest.xml
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          if [ -f "$MANIFEST" ]; then
            echo "Found manifest at: $MANIFEST"
            
            # Change package name
            if [ "${{ inputs.package_name }}" != "" ]; then
              OLD_PKG=$(grep -oP '(?<=package=")[^"]+' "$MANIFEST" | head -1)
              if [ -n "$OLD_PKG" ]; then
                sed -i "s|$OLD_PKG|${{ inputs.package_name }}|g" "$MANIFEST"
                echo "Package: $OLD_PKG -> ${{ inputs.package_name }}"
              fi
            fi
            
            # Change app label
            if [ "${{ inputs.app_name }}" != "" ]; then
              sed -i "s|android:label=\"[^\"]*\"|android:label=\"${{ inputs.app_name }}\"|g" "$MANIFEST"
              echo "App label changed to: ${{ inputs.app_name }}"
            fi
          else
            echo "⚠️ Manifest not found at $MANIFEST"
            # Try to find AndroidManifest.xml
            find . -name "AndroidManifest.xml" -type f | head -1 | while read -r file; do
              echo "Found manifest at: $file"
              if [ "${{ inputs.package_name }}" != "" ]; then
                OLD_PKG=$(grep -oP '(?<=package=")[^"]+' "$file" | head -1)
                if [ -n "$OLD_PKG" ]; then
                  sed -i "s|$OLD_PKG|${{ inputs.package_name }}|g" "$file"
                fi
              fi
              if [ "${{ inputs.app_name }}" != "" ]; then
                sed -i "s|android:label=\"[^\"]*\"|android:label=\"${{ inputs.app_name }}\"|g" "$file"
              fi
            done
          fi

      # Patch build.gradle (app)
      - name: Patch app/build.gradle
        run: |
          GRADLE="android/app/build.gradle"
          if [ -f "$GRADLE" ]; then
            echo "Found app/build.gradle at: $GRADLE"
            if [ "${{ inputs.package_name }}" != "" ]; then
              sed -i "s|applicationId \"[^\"]*\"|applicationId \"${{ inputs.package_name }}\"|g" "$GRADLE"
              echo "ApplicationId changed to: ${{ inputs.package_name }}"
            fi
            if [ "${{ inputs.version_code }}" != "" ]; then
              sed -i "s|versionCode [0-9]*|versionCode ${{ inputs.version_code }}|g" "$GRADLE"
              echo "VersionCode changed to: ${{ inputs.version_code }}"
            fi
            if [ "${{ inputs.version_name }}" != "" ]; then
              sed -i "s|versionName \"[^\"]*\"|versionName \"${{ inputs.version_name }}\"|g" "$GRADLE"
              echo "VersionName changed to: ${{ inputs.version_name }}"
            fi
          else
            echo "⚠️ app/build.gradle not found!"
          fi

      # Patch strings.xml
      - name: Patch strings.xml
        run: |
          STRINGS="android/app/src/main/res/values/strings.xml"
          if [ -f "$STRINGS" ] && [ "${{ inputs.app_name }}" != "" ]; then
            echo "Found strings.xml at: $STRINGS"
            sed -i "s|<string name=\"app_name\">[^<]*</string>|<string name=\"app_name\">${{ inputs.app_name }}</string>|g" "$STRINGS"
            echo "App name changed in strings.xml"
          else
            # Try to find strings.xml
            find . -name "strings.xml" -type f | head -1 | while read -r file; do
              if [ "${{ inputs.app_name }}" != "" ]; then
                sed -i "s|<string name=\"app_name\">[^<]*</string>|<string name=\"app_name\">${{ inputs.app_name }}</string>|g" "$file"
                echo "App name changed in: $file"
              fi
            done
          fi

      # Setup Gradle Wrapper
      - name: Setup Gradle Wrapper
        run: |
          if [ -f "android/gradlew" ]; then
            chmod +x android/gradlew
            echo "✅ Gradlew found at android/"
          elif [ -f "gradlew" ]; then
            chmod +x gradlew
            echo "✅ Gradlew found at root"
          else
            echo "⚠️ Creating gradle wrapper..."
            mkdir -p android/gradle/wrapper
            curl -L -o android/gradle/wrapper/gradle-wrapper.jar \
              "https://github.com/gradle/gradle/raw/v8.4.0/gradle/wrapper/gradle-wrapper.jar"
            echo 'distributionUrl=https\://services.gradle.org/distributions/gradle-8.4-bin.zip' > android/gradle/wrapper/gradle-wrapper.properties
            echo '#!/bin/bash' > android/gradlew
            echo 'exec java -jar "$(dirname "$0")/gradle/wrapper/gradle-wrapper.jar" "$@"' >> android/gradlew
            chmod +x android/gradlew
            echo "✅ Gradle wrapper created"
          fi

      # Build APK
      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          if [ "${{ inputs.build_type }}" = "release" ] || [ "${{ inputs.build_type }}" = "" ]; then
            echo "🔨 Building Release APK..."
            ./gradlew assembleRelease --no-daemon
          else
            echo "🔨 Building Debug APK..."
            ./gradlew assembleDebug --no-daemon
          fi
          cd ..

      # Find and rename APK
      - name: Find and Rename APK
        run: |
          mkdir -p output
          
          # Determine build type folder
          BUILD_TYPE="${{ inputs.build_type }}"
          if [ -z "$BUILD_TYPE" ]; then
            BUILD_TYPE="release"
          fi
          
          # Find APK
          APK_PATH=""
          if [ -f "android/app/build/outputs/apk/${BUILD_TYPE}/app-${BUILD_TYPE}.apk" ]; then
            APK_PATH="android/app/build/outputs/apk/${BUILD_TYPE}/app-${BUILD_TYPE}.apk"
          elif [ -f "android/app/build/outputs/apk/${BUILD_TYPE}/app.apk" ]; then
            APK_PATH="android/app/build/outputs/apk/${BUILD_TYPE}/app.apk"
          else
            # Search for any APK
            APK_PATH=$(find android/app/build/outputs/apk/ -name "*.apk" 2>/dev/null | head -1)
          fi
          
          if [ -n "$APK_PATH" ] && [ -f "$APK_PATH" ]; then
            APK_NAME="${{ inputs.app_name }}"
            if [ -z "$APK_NAME" ]; then
              APK_NAME="SyncXxX"
            fi
            if [ "$BUILD_TYPE" = "debug" ]; then
              APK_NAME="${APK_NAME}_debug"
            fi
            cp "$APK_PATH" "output/${APK_NAME}.apk"
            echo "✅ APK saved as output/${APK_NAME}.apk"
            echo "apk_exists=true" >> $GITHUB_OUTPUT
          else
            echo "❌ No APK found!"
            echo "apk_exists=false" >> $GITHUB_OUTPUT
            exit 1
          fi

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.app_name }}-v${{ inputs.version_name }}-${{ inputs.build_type }}
          path: output/*.apk
          retention-days: 30

      - name: Send APK to Telegram (if triggered from bot)
        if: github.event.inputs.chat_id != '' && github.event.inputs.bot_token != '' && steps.find-and-rename-apk.outputs.apk_exists == 'true'
        run: |
          APK=$(find output -name "*.apk" 2>/dev/null | head -1)
          if [ -n "$APK" ] && [ -f "$APK" ]; then
            SIZE=$(du -sh "$APK" | cut -f1)
            curl -s -X POST "https://api.telegram.org/bot${{ inputs.bot_token }}/sendDocument" \
              -F chat_id="${{ inputs.chat_id }}" \
              -F document=@"$APK" \
              -F parse_mode="HTML" \
              -F caption="✅ <b>Build Selesai!</b>%0A%0A🏷️ <b>App:</b> ${{ inputs.app_name }}%0A📦 <b>Package:</b> <code>${{ inputs.package_name }}</code>%0A🔢 <b>Versi:</b> <code>${{ inputs.version_name }}</code> (code: ${{ inputs.version_code }})%0A🔨 <b>Tipe:</b> <code>${{ inputs.build_type }}</code>%0A🆔 <b>Build ID:</b> <code>${{ inputs.build_id }}</code>%0A📁 <b>Size:</b> <code>$SIZE</code>%0A%0A⚡ by @Zyvarno1"
          fi

      # Delete ZIP from repository
      - name: Delete ZIP from Repository
        if: github.event.inputs.is_zip == 'true' && github.event.inputs.zip_path != ''
        run: |
          echo "🗑️ Deleting ZIP from repository..."
          curl -X DELETE \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/contents/${{ github.event.inputs.zip_path }}?message=Delete%20temporary%20zip%20file"

      - name: Notify Failure (if triggered from bot)
        if: failure() && github.event.inputs.chat_id != '' && github.event.inputs.bot_token != ''
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ inputs.bot_token }}/sendMessage" \
            -d chat_id="${{ inputs.chat_id }}" \
            -d parse_mode="HTML" \
            -d text="❌ <b>Build Gagal!</b>%0A%0A🏷️ App: <code>${{ inputs.app_name }}</code>%0A📦 Package: <code>${{ inputs.package_name }}</code>%0A🆔 Build ID: <code>${{ inputs.build_id }}</code>%0A%0A🔗 https://github.com/${{ github.repository }}/actions"
